# ============================================================
# DeployPortal — Docker Compose (Windows containers)
# ============================================================
# Requires: Docker Desktop switched to Windows containers
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
# Rebuild: docker compose up -d --build
# ============================================================

services:
  deploy-portal:
    image: vglu/d365fo-deploy-portal:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deploy-portal
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persistent data: database, user settings, encryption keys
      - type: volume
        source: deploy-data
        target: C:\app\data
      # Uploaded packages
      - type: volume
        source: deploy-packages
        target: C:\app\packages
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - "DeployPortal__DatabasePath=C:\\app\\data\\deploy-portal.db"
      - "DeployPortal__PackageStoragePath=C:\\app\\packages"
      - "DeployPortal__TempWorkingDir=C:\\temp\\DeployPortal"
      - "DeployPortal__DataProtectionKeysPath=C:\\app\\data\\keys"
      - "DeployPortal__UserSettingsPath=C:\\app\\data\\usersettings.json"
      - DeployPortal__ConverterEngine=BuiltIn
      # Uncomment to change the port:
      # - ASPNETCORE_URLS=http://+:8080
      # Uncomment for Azure Functions processing mode:
      # - DeployPortal__ProcessingMode=Azure
      # - DeployPortal__AzureFunctionsUrl=https://my-func.azurewebsites.net
      # - DeployPortal__AzureBlobConnectionString=...
      # - DeployPortal__AzureFunctionKey=...
    healthcheck:
      test: ["CMD", "powershell", "-Command", "try { $$resp = Invoke-WebRequest -Uri http://localhost:5000/ -UseBasicParsing -TimeoutSec 4; if ($$resp.StatusCode -eq 200) { exit 0 } else { exit 1 } } catch { exit 1 }"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  deploy-data:
    name: deploy-portal-data
  deploy-packages:
    name: deploy-portal-packages
