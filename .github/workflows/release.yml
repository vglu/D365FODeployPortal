# ============================================================
# Release & Package workflow
# ============================================================
# - Trigger: push tag v* (e.g. v1.8.0)
# - Builds Windows self-contained zip and publishes to GitHub Release
# - Builds Windows Docker image: pushes to GHCR (ghcr.io) and Docker Hub (if secrets set)
# - Docker Hub push: set repo secrets DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (job runs always; if missing, job fails but workflow continues)
# ============================================================

name: Release and Package

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  # ---- Windows self-contained build → Release artifact ----
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set version from tag
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Publish (Windows self-contained)
        run: |
          $outDir = "$env:RUNNER_TEMP\publish"
          dotnet publish src/DeployPortal/DeployPortal.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $outDir
          Copy-Item scripts/Setup-ServicePrincipal.ps1, documents/Setup-ServicePrincipal-Manual.md, scripts/check-prerequisites.ps1 -Destination $outDir -ErrorAction SilentlyContinue
          if (Test-Path documents/publish-README.md) { Copy-Item documents/publish-README.md $outDir\README.md }
          Set-Content -Path (Join-Path $outDir "start.cmd") -Value "@echo off","echo Starting DeployPortal...","start http://localhost:5000","DeployPortal.exe --urls `"http://localhost:5000`"" -Encoding ASCII
          echo "OUT_DIR=$outDir" >> $env:GITHUB_ENV

      - name: Create zip artifact
        run: |
          $zipName = "DeployPortal-$env:VERSION-win-x64.zip"
          Compress-Archive -Path "$env:OUT_DIR\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          Move-Item $zipName $env:GITHUB_WORKSPACE

      - name: Upload zip for release
        uses: actions/upload-artifact@v4
        with:
          name: deploy-portal-windows
          path: DeployPortal-${{ env.VERSION }}-win-x64.zip

  # ---- Docker build (Windows containers) → GitHub Container Registry ----
  build-docker:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository_owner }}".ToLower()
          docker build `
            -t "ghcr.io/${repo}/d365fo-deploy-portal:${tag}" `
            -t "ghcr.io/${repo}/d365fo-deploy-portal:latest" `
            .

      - name: Push Docker image to GHCR
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository_owner }}".ToLower()
          docker push "ghcr.io/${repo}/d365fo-deploy-portal:${tag}"
          docker push "ghcr.io/${repo}/d365fo-deploy-portal:latest"

  # ---- Push same image to Docker Hub ----
  push-dockerhub:
    needs: [build-docker]
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (for Docker Hub overview)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to Docker Hub
        shell: bash
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Log in to GitHub Container Registry
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull from GHCR and push to Docker Hub
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository_owner }}".ToLower()
          docker pull "ghcr.io/${repo}/d365fo-deploy-portal:${tag}"
          docker tag "ghcr.io/${repo}/d365fo-deploy-portal:${tag}" "vglu/d365fo-deploy-portal:${tag}"
          docker tag "ghcr.io/${repo}/d365fo-deploy-portal:${tag}" "vglu/d365fo-deploy-portal:latest"
          docker push "vglu/d365fo-deploy-portal:${tag}"
          docker push "vglu/d365fo-deploy-portal:latest"

      - name: Update Docker Hub repository overview
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          RESP=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}")
          TOKEN=$(echo "$RESP" | jq -r .token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "Failed to get Docker Hub JWT"; exit 1; fi
          BODY=$(jq -n --rawfile f .github/docker-hub-overview.md '{full_description: $f}')
          curl -s -X PATCH "https://hub.docker.com/v2/repositories/vglu/d365fo-deploy-portal/" \
            -H "Authorization: JWT ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  # ---- Create GitHub Release with notes and artifact ----
  release:
    needs: [build-windows, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare release notes file
        run: |
          NOTES_FILE="documents/RELEASE_NOTES_v${{ steps.ver.outputs.VERSION }}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_body.md
          else
            echo "## ${{ github.ref_name }}" > release_body.md
            echo "" >> release_body.md
            echo "Release ${{ github.ref_name }}." >> release_body.md
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-portal-windows
          path: release-artifact

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifact/DeployPortal-${{ steps.ver.outputs.VERSION }}-win-x64.zip
          fail_on_unmatched_files: true
