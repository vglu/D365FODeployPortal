# ============================================================
# Release & Package workflow
# ============================================================
# - Trigger: push tag v* (e.g. v1.5.0)
# - Builds Windows self-contained zip and publishes to GitHub Release
# - Builds Docker image: pushes to GHCR (ghcr.io) and Docker Hub (if secrets set)
# - Repo secrets for Docker Hub: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# ============================================================

name: Release and Package

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  # ---- Windows self-contained build → Release artifact ----
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set version from tag
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Publish (Windows self-contained)
        run: |
          $outDir = "$env:RUNNER_TEMP\publish"
          dotnet publish src/DeployPortal/DeployPortal.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $outDir
          Copy-Item Setup-ServicePrincipal.ps1, Setup-ServicePrincipal-Manual.md, check-prerequisites.ps1 -Destination $outDir -ErrorAction SilentlyContinue
          if (Test-Path publish-README.md) { Copy-Item publish-README.md $outDir\README.md }
          Set-Content -Path (Join-Path $outDir "start.cmd") -Value "@echo off","echo Starting DeployPortal...","start http://localhost:5000","DeployPortal.exe --urls `"http://localhost:5000`"" -Encoding ASCII
          echo "OUT_DIR=$outDir" >> $env:GITHUB_ENV

      - name: Create zip artifact
        run: |
          $zipName = "DeployPortal-$env:VERSION-win-x64.zip"
          Compress-Archive -Path "$env:OUT_DIR\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          Move-Item $zipName $env:GITHUB_WORKSPACE

      - name: Upload zip for release
        uses: actions/upload-artifact@v4
        with:
          name: deploy-portal-windows
          path: DeployPortal-${{ env.VERSION }}-win-x64.zip

  # ---- Docker build → GitHub Container Registry (Packages) ----
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/d365fo-deploy-portal
            vglu/d365fo-deploy-portal
          tags: |
            type=ref,event=tag,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Create GitHub Release with notes and artifact ----
  release:
    needs: [build-windows, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare release notes file
        run: |
          NOTES_FILE="RELEASE_NOTES_v${{ steps.ver.outputs.VERSION }}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_body.md
          else
            echo "## ${{ github.ref_name }}" > release_body.md
            echo "" >> release_body.md
            echo "Release ${{ github.ref_name }}." >> release_body.md
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-portal-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            DeployPortal-${{ steps.ver.outputs.VERSION }}-win-x64.zip
          fail_on_unmatched_files: true
